<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"/>
  <title>CascadeScope</title>
  <style>
    body { margin: 0; background-color: #14171c; overflow: hidden; }
    .emscripten {
      position: absolute;
      top: 0px; left: 0px;
      margin: 0px; border: 0;
      width: 100%; height: 100%;
      overflow: hidden; display: block;
    }
    #canvas:focus { outline: none; }
    #status {
      position: absolute; bottom: 8px; left: 8px;
      color: #aaa; font-family: monospace; font-size: 12px;
    }
    #cascadescope-open-overlay {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      z-index: 1000;
      cursor: pointer;
      justify-content: center; align-items: center;
      font-family: monospace; font-size: 18px; color: #fff;
    }
  </style>
</head>
<body>
  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
  <div id="status">Loading...</div>
  <input type="file" id="cascadescope-file-input" style="display:none"
         accept=".step,.stp,.iges,.igs,.stl,.obj,.ply,.wrl,.brep,.xbf" multiple />
  <div id="cascadescope-open-overlay">Click anywhere to open file picker...</div>
  <script type='text/javascript'>
    var CascadeScopeShell = {
      getCanvas: function() {
        return document.getElementById('canvas');
      },
      getStatusElement: function() {
        return document.getElementById('status');
      },
      focusCanvas: function() {
        var canvas = CascadeScopeShell.getCanvas();
        if (canvas) {
          canvas.focus();
        }
      },
      getCanvasCssWidth: function() {
        var canvas = CascadeScopeShell.getCanvas();
        if (!canvas) {
          return 0.0;
        }
        var rect = canvas.getBoundingClientRect();
        if (rect.width > 0.0) {
          return rect.width;
        }
        return canvas.clientWidth > 0 ? canvas.clientWidth : 0.0;
      },
      getCanvasCssHeight: function() {
        var canvas = CascadeScopeShell.getCanvas();
        if (!canvas) {
          return 0.0;
        }
        var rect = canvas.getBoundingClientRect();
        if (rect.height > 0.0) {
          return rect.height;
        }
        return canvas.clientHeight > 0 ? canvas.clientHeight : 0.0;
      },
      showErrorDialog: function(title, message) {
        alert(title + ': ' + message);
      },
      setStatus: function(text) {
        var status = CascadeScopeShell.getStatusElement();
        if (!status) {
          return;
        }
        var safeText = text || '';
        status.innerText = safeText;
        status.style.display = safeText.length > 0 ? 'block' : 'none';
      }
    };

    // File upload infrastructure for CascadeScope Wasm build.
    var CascadeScopeFileUpload = {
      pending: false,
      acceptedExtensions: ['step', 'stp', 'iges', 'igs', 'stl', 'obj', 'ply', 'wrl', 'brep', 'xbf'],
      init: function() {
        var input = document.getElementById('cascadescope-file-input');
        var overlay = document.getElementById('cascadescope-open-overlay');
        input.addEventListener('change', function(e) {
          CascadeScopeFileUpload.loadFiles(e.target.files);
          input.value = '';
        });
        // When the overlay is visible, any click opens the file picker.
        overlay.addEventListener('click', function() {
          overlay.style.display = 'none';
          input.click();
        });
        CascadeScopeFileUpload.initDragDrop();
      },
      // Called from C++ to request a file open dialog.
      // Shows an overlay that the user must click (browser security requirement).
      requestOpen: function() {
        var overlay = document.getElementById('cascadescope-open-overlay');
        overlay.style.display = 'flex';
      },
      supportsFileName: function(name) {
        if (!name) {
          return false;
        }
        var dot = name.lastIndexOf('.');
        if (dot < 0 || dot + 1 >= name.length) {
          return false;
        }
        var ext = name.substring(dot + 1).toLowerCase();
        return CascadeScopeFileUpload.acceptedExtensions.indexOf(ext) >= 0;
      },
      detectDropZone: function(event) {
        var canvas = document.getElementById('canvas');
        if (!canvas) {
          return 0;
        }
        var rect = canvas.getBoundingClientRect();
        var midX = rect.left + rect.width * 0.5;
        return event.clientX >= midX ? 1 : 0;
      },
      hasSupportedFiles: function(fileList) {
        if (!fileList) {
          return false;
        }
        for (var i = 0; i < fileList.length; i++) {
          if (CascadeScopeFileUpload.supportsFileName(fileList[i].name)) {
            return true;
          }
        }
        return false;
      },
      notifyDragState: function(isActive, zone, hasSupportedFiles) {
        if (!Module['ccall']) {
          return;
        }
        Module['ccall']('CascadeScope_WasmDragStateChanged',
                        null,
                        ['number', 'number', 'number'],
                        [isActive ? 1 : 0, zone, hasSupportedFiles ? 1 : 0]);
      },
      // Load an array of File objects into the Emscripten VFS.
      loadFiles: function(files, options) {
        options = options || {};
        var callbackName = options.callbackName || 'CascadeScope_WasmFileUploaded';
        var dropZone = options.dropZone || 0;
        if (!Module['ccall'] || !Module['FS']) {
          console.warn('CascadeScope: runtime is not ready for file upload callbacks yet.');
          var statusEl = document.getElementById('status');
          if (statusEl && !window.crossOriginIsolated) {
            statusEl.innerText = 'File drop ignored: CascadeScope runtime is not '
              + 'loaded (page is not cross-origin-isolated).';
          }
          return;
        }
        for (var i = 0; i < files.length; i++) {
          (function(file) {
            var reader = new FileReader();
            reader.onload = function(ev) {
              var data = new Uint8Array(ev.target.result);
              var path = '/tmp/' + file.name;
              try { Module['FS'].unlink(path); } catch(ex) {}
              try { Module['FS'].writeFile(path, data); } catch(ex) {
                console.error('CascadeScope: failed to write file to VFS: ' + ex);
                return;
              }
              if (callbackName === 'CascadeScope_WasmFileDropped') {
                Module['ccall'](callbackName,
                                null,
                                ['string', 'number', 'number'],
                                [path, dropZone, CascadeScopeFileUpload.supportsFileName(file.name) ? 1 : 0]);
              } else {
                Module['ccall'](callbackName, null, ['string'], [path]);
              }
            };
            reader.readAsArrayBuffer(file);
          })(files[i]);
        }
      },
      // Install drag-and-drop on the canvas element.
      initDragDrop: function() {
        var canvas = document.getElementById('canvas');
        if (!canvas) {
          return;
        }
        var dragDepth = 0;
        var isInsideCanvas = function(e) {
          var rect = canvas.getBoundingClientRect();
          return e.clientX >= rect.left && e.clientX <= rect.right
              && e.clientY >= rect.top && e.clientY <= rect.bottom;
        };
        var updateDragState = function(e, isActive) {
          var files = (e.dataTransfer && e.dataTransfer.files) ? e.dataTransfer.files : [];
          if (isActive && !isInsideCanvas(e)) {
            CascadeScopeFileUpload.notifyDragState(false, 0, false);
            return;
          }
          CascadeScopeFileUpload.notifyDragState(isActive,
                                                 CascadeScopeFileUpload.detectDropZone(e),
                                                 CascadeScopeFileUpload.hasSupportedFiles(files));
        };
        window.addEventListener('dragover', function(e) {
          e.preventDefault();
        });
        window.addEventListener('drop', function(e) {
          e.preventDefault();
        });
        canvas.addEventListener('dragenter', function(e) {
          e.preventDefault();
          e.stopPropagation();
          dragDepth++;
          updateDragState(e, true);
        });
        canvas.addEventListener('dragover', function(e) {
          e.preventDefault();
          e.stopPropagation();
          updateDragState(e, true);
        });
        canvas.addEventListener('dragleave', function(e) {
          e.preventDefault();
          e.stopPropagation();
          dragDepth = Math.max(0, dragDepth - 1);
          if (dragDepth === 0) {
            CascadeScopeFileUpload.notifyDragState(false, 0, false);
          }
        });
        canvas.addEventListener('drop', function(e) {
          e.preventDefault();
          e.stopPropagation();
          dragDepth = 0;
          var zone = CascadeScopeFileUpload.detectDropZone(e);
          CascadeScopeFileUpload.notifyDragState(false, zone, false);
          if (e.dataTransfer && e.dataTransfer.files.length > 0) {
            CascadeScopeFileUpload.loadFiles(e.dataTransfer.files, {
              callbackName: 'CascadeScope_WasmFileDropped',
              dropZone: zone
            });
          }
        });
      }
    };

    // File download infrastructure for CascadeScope Wasm build. Reads a file
    // from the Emscripten VFS and hands it to the browser as a download.
    var CascadeScopeFileDownload = {
      trigger: function(vfsPath, downloadName) {
        if (!Module['FS']) {
          console.warn('CascadeScope: runtime is not ready for file download.');
          return;
        }
        var data;
        try {
          data = Module['FS'].readFile(vfsPath);
        } catch (ex) {
          console.error('CascadeScope: failed to read VFS file for download: ' + ex);
          return;
        }
        var blob = new Blob([data], { type: 'application/octet-stream' });
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.href = url;
        link.download = downloadName || 'download.brep';
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(function() {
          URL.revokeObjectURL(url);
          try { Module['FS'].unlink(vfsPath); } catch (ex) {}
        }, 1000);
      }
    };

    var CascadeScopeBuildStamp = '1776341252';
    function cascadeScopeVersionedPath(path) {
      if (!path || path.indexOf('blob:') === 0 || path.indexOf('data:') === 0) {
        return path;
      }
      var separator = path.indexOf('?') >= 0 ? '&' : '?';
      return path + separator + 'v=' + CascadeScopeBuildStamp;
    }

    // Tracks the set of currently-open Emscripten run dependencies by name.
    // We hook addRunDependency/removeRunDependency below so the set stays in
    // sync with Emscripten's internal counter and we can report exactly what
    // is blocking the boot when Loading... persists (A1 in the plan).
    var cascadeScopePendingDeps = new Set();
    var cascadeScopeStuckDepWatchdog = null;

    // FIFO queue so that at most one FS.syncfs(false, ...) is in flight at
    // a time.  Two persistence paths can fire on the same Save() tick
    // (writeAtomic + imgui.ini flush); allowing them to overlap has been
    // observed to leave the IndexedDB transaction pool in a state where a
    // subsequent FS.syncfs(true, ...) hydrate never reports back.  This
    // helper (B in the plan) removes that overlap.
    var cascadeScopeSyncfsQueue = [];
    var cascadeScopeSyncfsBusy = false;
    var CASCADESCOPE_SYNCFS_PERSIST_TIMEOUT_MS = 5000;
    var CASCADESCOPE_IDBFS_HYDRATE_TIMEOUT_MS = 6000;
    // Cache-bypass sentinel added by our override of coi-serviceworker's
    // doReload.  When the SW is freshly installed, a plain location.reload()
    // may be served from the HTTP cache without going through the SW (Safari
    // is the worst offender).  Navigating to the same URL with ?_csr=<ts>
    // forces the browser to do a fresh network fetch, which the installed SW
    // intercepts and decorates with COOP/COEP headers.
    var CASCADESCOPE_COI_CSR_PARAM = '_csr';
    // Recovery sentinel added when we detect a stale SW: the page is
    // controlled by a SW but crossOriginIsolated is still false (typical on
    // Safari Cmd+R).  We unregister the SW and redirect with _coi=1 so that
    // the NEXT load has no controller — coi-serviceworker.js will then do a
    // fresh register → install → claim → doReload cycle.
    var CASCADESCOPE_COI_RECOVERY_PARAM = '_coi';
    // Cap on how long we wait for coi-serviceworker.js's own register+reload
    // cycle to take over before we fall back to showing an error.  A healthy
    // SW registers in tens of milliseconds; 2.5 s is a pessimistic ceiling.
    var CASCADESCOPE_COI_BOOTSTRAP_TIMEOUT_MS = 2500;
    function cascadeScopeDrainSyncfsQueue() {
      if (cascadeScopeSyncfsBusy || cascadeScopeSyncfsQueue.length === 0) {
        return;
      }
      if (!(Module.FS && Module.FS.syncfs)) {
        cascadeScopeSyncfsQueue.length = 0;
        return;
      }
      cascadeScopeSyncfsBusy = true;
      var done = cascadeScopeSyncfsQueue.shift();
      var isSettled = false;
      var watchdog = setTimeout(function() {
        if (isSettled) {
          return;
        }
        isSettled = true;
        cascadeScopeSyncfsBusy = false;
        try {
          if (done) {
            done(new Error('IDBFS persist timed out after '
              + CASCADESCOPE_SYNCFS_PERSIST_TIMEOUT_MS + 'ms'));
          }
        } finally {
          cascadeScopeDrainSyncfsQueue();
        }
      }, CASCADESCOPE_SYNCFS_PERSIST_TIMEOUT_MS);
      Module.FS.syncfs(false, function(err) {
        if (isSettled) {
          return;
        }
        isSettled = true;
        clearTimeout(watchdog);
        cascadeScopeSyncfsBusy = false;
        try { if (done) { done(err); } }
        finally { cascadeScopeDrainSyncfsQueue(); }
      });
    }

    var Module = {
      // Expose the pending-deps set on Module so the C++ side (or a user in
      // DevTools) can inspect it when debugging a stuck boot.
      pendingDeps: cascadeScopePendingDeps,
      // Serialized persist helper used by the C++ side via Module.syncfsPersist.
      // Direct calls to Module.FS.syncfs(false, ...) still work and are used
      // as a fallback; routing through here simply prevents concurrent writes.
      syncfsPersist: function(callback) {
        cascadeScopeSyncfsQueue.push(callback || null);
        cascadeScopeDrainSyncfsQueue();
      },
      preRun: [function () {
        // Hook Emscripten's addRunDependency/removeRunDependency to keep
        // cascadeScopePendingDeps in sync. Emscripten assigns these on
        // Module during its own init, which completes before preRun runs
        // — so this is the earliest safe hook point. User-set Module
        // fields set on the literal above are clobbered by Emscripten
        // init for these two specific names, so the wrap must happen here.
        if (!Module.addRunDependency.__cs_wrapped)
        {
          var aOriginalAdd = Module.addRunDependency;
          var aOriginalRemove = Module.removeRunDependency;
          Module.addRunDependency = function (id) {
            cascadeScopePendingDeps.add(id);
            return aOriginalAdd.call(Module, id);
          };
          Module.removeRunDependency = function (id) {
            cascadeScopePendingDeps.delete(id);
            return aOriginalRemove.call(Module, id);
          };
          Module.addRunDependency.__cs_wrapped = true;
        }

        var idbfs = (typeof IDBFS !== 'undefined')
          ? IDBFS
          : (FS && FS.filesystems ? FS.filesystems.IDBFS : null);
        if (!idbfs) {
          console.warn('IDBFS unavailable; settings will not persist.');
          return;
        }
        try { FS.mkdir('/cs_config'); }
        catch (e) {
          if (!e || e.code !== 'EEXIST') { console.warn('mkdir /cs_config:', e); }
        }
        try { FS.mount(idbfs, {}, '/cs_config'); }
        catch (e) { console.warn('IDBFS mount failed:', e); return; }

        // Watchdog: FS.syncfs(true) has been observed to never fire its
        // callback when the tab's underlying IndexedDB is in a blocked
        // state from the previous page-unload's writes. Without this,
        // Loading... hangs forever. Settings hydration is best-effort —
        // continuing without hydrated settings beats never loading.
        Module.addRunDependency('cs-config-syncfs');
        var aIsSettled = false;
        var aWatchdog = setTimeout(function () {
          if (aIsSettled) { return; }
          aIsSettled = true;
          var aKnown = Array.from(cascadeScopePendingDeps);
          console.warn('IDBFS hydrate timed out after '
            + CASCADESCOPE_IDBFS_HYDRATE_TIMEOUT_MS
            + 'ms; continuing without saved settings. Pending deps: '
            + JSON.stringify(aKnown));
          Module.removeRunDependency('cs-config-syncfs');
        }, CASCADESCOPE_IDBFS_HYDRATE_TIMEOUT_MS);
        FS.syncfs(true, function (err) {
          if (aIsSettled) { return; }
          aIsSettled = true;
          clearTimeout(aWatchdog);
          if (err) { console.warn('IDBFS hydrate failed:', err); }
          Module.removeRunDependency('cs-config-syncfs');
        });
      }],
      print: function(text) { console.log(text); },
      printErr: function(text) { console.error(text); },
      canvas: CascadeScopeShell.getCanvas(),
      locateFile: function(path, prefix) {
        return cascadeScopeVersionedPath((prefix || '') + path);
      },
      setStatus: function(text) {
        CascadeScopeShell.setStatus(text);
      },
      monitorRunDependencies: function(left) {
        if (left === 0) {
          if (cascadeScopeStuckDepWatchdog !== null) {
            clearTimeout(cascadeScopeStuckDepWatchdog);
            cascadeScopeStuckDepWatchdog = null;
          }
          Module.setStatus('');
          return;
        }
        // If run dependencies remain open for more than 2s, something is
        // stalling boot — tell the user (and us, in bug reports) exactly
        // which dependency names are still outstanding. Emscripten's own
        // pre-preRun deps (wasm-instantiate, pthread pool workers) are not
        // visible to our hook since they are added before preRun runs; if
        // the known-names list is empty but `left > 0` we report that too,
        // which is itself a strong diagnostic signal ("stuck in Emscripten
        // internals, not our IDBFS hydrate").
        if (cascadeScopeStuckDepWatchdog === null) {
          var aLeftAtStart = left;
          cascadeScopeStuckDepWatchdog = setTimeout(function () {
            cascadeScopeStuckDepWatchdog = null;
            var aKnown = Array.from(cascadeScopePendingDeps);
            console.warn('CascadeScope: boot stalled — ' + aLeftAtStart
                         + ' run deps still pending after 2s. Known-name set: '
                         + (aKnown.length > 0 ? JSON.stringify(aKnown)
                            : '[] (unnamed — likely Emscripten-internal, e.g. pthread pool or wasm-instantiate)'));
          }, 2000);
        }
      }
    };

    CascadeScopeFileUpload.init();
    window.onerror = function(message, source, lineno, colno, error) {
      var errorName = '';
      if (error && typeof error.name === 'string' && error.name.length > 0) {
        errorName = error.name;
      } else if (error && error.constructor && typeof error.constructor.name === 'string') {
        errorName = error.constructor.name;
      }

      var errorText = typeof message === 'string'
        ? message
        : (error && typeof error.toString === 'function' ? String(error) : '');

      if (errorName === 'EmscriptenSjLj' || errorText.indexOf('EmscriptenSjLj') >= 0) {
        return true;
      }

      if (error && typeof error.message === 'string' && error.message.length > 0) {
        console.error('error:', error.message, source, lineno, colno, error);
      } else {
        console.error('error:', message, source, lineno, colno, error);
      }
      return false;
    };
  </script>
  <script>
    // Override coi-serviceworker.js's doReload so the reload it fires right
    // after installing the SW is a cache-BYPASSING navigation.  A plain
    // location.reload() can be served from the HTTP cache of the first
    // (SW-less, header-less) response, which leaves crossOriginIsolated=false
    // and the page loops.  Adding ?_csr=<timestamp> creates a distinct URL
    // that the browser must fetch fresh — and the newly-installed SW adds
    // the COOP/COEP headers on that fresh response.  coi-serviceworker.js
    // reads window.coi at its line 77, so the override must be declared
    // BEFORE the <script src="coi-serviceworker.js"> tag below.
    function cascadeScopeReloadWithCacheBypass() {
      var aUrl = new URL(location.href);
      aUrl.searchParams.set(CASCADESCOPE_COI_CSR_PARAM, Date.now().toString());
      location.replace(aUrl.href);
    }
    window.coi = {
      doReload: cascadeScopeReloadWithCacheBypass
    };
  </script>
  <!-- No cache-buster query here: the URL used to register the Service Worker
       IS the src attribute of the loader tag, and each distinct registration URL
       is treated as a distinct SW by the browser. A per-build query would force
       a fresh SW registration + reload on every rebuild. The SW file itself is
       refreshed by the browser's built-in byte-compare update path on register(),
       so the cache-buster here was never load-bearing. -->
  <script src="coi-serviceworker.js"></script>
  <script>
    // Safari (and sometimes Chromium with aggressive caching) sends the Cmd+R
    // navigation straight from the HTTP cache without routing through the SW,
    // so the cached header-less response is served and crossOriginIsolated
    // ends up false even though a SW is registered.
    //
    // Recovery: if a controller exists but COI is off, unregister the SW and
    // redirect to ?_coi=1.  The next load has no controller, coi-serviceworker
    // re-registers cleanly, and its doReload fires a fresh ?_csr= navigation
    // that the SW intercepts — restoring COI.
    //
    // Seeing ?_coi=1 in the URL on entry means we just came out of the
    // unregister step; strip it and do nothing else — coi-serviceworker is
    // about to take over.
    (function () {
      if (window.crossOriginIsolated || !navigator.serviceWorker) {
        return;
      }
      var aUrl = new URL(location.href);
      if (aUrl.searchParams.has(CASCADESCOPE_COI_RECOVERY_PARAM)) {
        aUrl.searchParams.delete(CASCADESCOPE_COI_RECOVERY_PARAM);
        history.replaceState(null, '', aUrl.href);
        return;
      }
      if (!navigator.serviceWorker.controller) {
        return;
      }
      CascadeScopeShell.setStatus('Re-establishing cross-origin isolation...');
      navigator.serviceWorker.getRegistrations().then(function (theRegs) {
        return Promise.all(theRegs.map(function (theReg) {
          return theReg.unregister().catch(function () { return null; });
        }));
      }).then(function () {
        var aFreshUrl = new URL(location.href);
        aFreshUrl.searchParams.set(CASCADESCOPE_COI_RECOVERY_PARAM, '1');
        location.replace(aFreshUrl.href);
      });
    })();
  </script>
  <!-- <script async type="text/javascript" src="CascadeScope.js"></script> -->
  <script>
    // Load CascadeScope.js only in a cross-origin-isolated context. With
    // -pthread, Emscripten's preRun spawns Web Workers and transfers a
    // SharedArrayBuffer to them — that postMessage throws DataCloneError when
    // crossOriginIsolated is false, and the ensuing pthread_create failure
    // cascades into std::system_error from std::async calls in the C++ app,
    // aborting the wasm runtime.
    //
    // Control flow (all driven by coi-serviceworker.js + the recovery script
    // above; no retry counter, no setTimeout race against the SW claim):
    //   - COI=true                              → strip _csr/_coi, load module.
    //   - COI=false, no navigator.serviceWorker → show error, stop.
    //   - COI=false otherwise                   → wait. coi-serviceworker.js
    //                                             registers the SW and then
    //                                             calls its doReload (we
    //                                             override it to do a cache-
    //                                             bypassing ?_csr=<ts> reload).
    //                                             On the reloaded page the
    //                                             navigation fetch flows
    //                                             through the SW, headers are
    //                                             attached, and we land back
    //                                             here with COI=on.
    //
    // A failsafe surfaces an error if no reload fires within the budget.
    (function () {
      function aAppendModule() {
        var aScript = document.createElement('script');
        aScript.async = true;
        aScript.type = 'text/javascript';
        aScript.src = 'CascadeScope.js?v=1776341252';
        document.body.appendChild(aScript);
      }

      if (window.crossOriginIsolated) {
        var aCleanUrl = new URL(location.href);
        var aHasChange = false;
        if (aCleanUrl.searchParams.has(CASCADESCOPE_COI_CSR_PARAM)) {
          aCleanUrl.searchParams.delete(CASCADESCOPE_COI_CSR_PARAM);
          aHasChange = true;
        }
        if (aCleanUrl.searchParams.has(CASCADESCOPE_COI_RECOVERY_PARAM)) {
          aCleanUrl.searchParams.delete(CASCADESCOPE_COI_RECOVERY_PARAM);
          aHasChange = true;
        }
        if (aHasChange) {
          history.replaceState(null, '', aCleanUrl.href);
        }
        aAppendModule();
        return;
      }

      if (!navigator.serviceWorker) {
        CascadeScopeShell.setStatus('CascadeScope requires a cross-origin-isolated '
          + 'context. Serve over HTTPS (or localhost) with a service worker '
          + 'that sets COOP=same-origin and COEP=require-corp.');
        return;
      }

      CascadeScopeShell.setStatus('Enabling cross-origin isolation...');

      // Failsafe: if neither coi-serviceworker's doReload nor our recovery
      // script fires a reload within the budget, surface an actionable error
      // so the user isn't left staring at "Enabling..." forever. This is a
      // diagnostic, not a retry — it fires at most once per load.
      setTimeout(function () {
        if (!window.crossOriginIsolated) {
          CascadeScopeShell.setStatus('Unable to enable cross-origin isolation. '
            + 'Try a hard refresh, or open the page in a new tab or different '
            + 'browser. If the problem persists, the deployment is not serving '
            + 'the required COOP/COEP headers.');
        }
      }, CASCADESCOPE_COI_BOOTSTRAP_TIMEOUT_MS);
    })();
  </script>
</body>
</html>
