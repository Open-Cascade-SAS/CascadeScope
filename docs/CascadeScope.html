<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"/>
  <title>CascadeScope</title>
  <style>
    body { margin: 0; background-color: #14171c; overflow: hidden; }
    .emscripten {
      position: absolute;
      top: 0px; left: 0px;
      margin: 0px; border: 0;
      width: 100%; height: 100%;
      overflow: hidden; display: block;
    }
    #canvas:focus { outline: none; }
    #status {
      position: absolute; bottom: 8px; left: 8px;
      color: #aaa; font-family: monospace; font-size: 12px;
    }
    #cascadescope-open-overlay {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      z-index: 1000;
      cursor: pointer;
      justify-content: center; align-items: center;
      font-family: monospace; font-size: 18px; color: #fff;
    }
  </style>
</head>
<body>
  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
  <div id="status">Loading...</div>
  <input type="file" id="cascadescope-file-input" style="display:none"
         accept=".step,.stp,.iges,.igs,.stl,.obj,.ply,.wrl,.brep,.xbf" multiple />
  <div id="cascadescope-open-overlay">Click anywhere to open file picker...</div>
  <script type='text/javascript'>
    var CascadeScopeShell = {
      getCanvas: function() {
        return document.getElementById('canvas');
      },
      getStatusElement: function() {
        return document.getElementById('status');
      },
      focusCanvas: function() {
        var canvas = CascadeScopeShell.getCanvas();
        if (canvas) {
          canvas.focus();
        }
      },
      getCanvasCssWidth: function() {
        var canvas = CascadeScopeShell.getCanvas();
        if (!canvas) {
          return 0.0;
        }
        var rect = canvas.getBoundingClientRect();
        if (rect.width > 0.0) {
          return rect.width;
        }
        return canvas.clientWidth > 0 ? canvas.clientWidth : 0.0;
      },
      getCanvasCssHeight: function() {
        var canvas = CascadeScopeShell.getCanvas();
        if (!canvas) {
          return 0.0;
        }
        var rect = canvas.getBoundingClientRect();
        if (rect.height > 0.0) {
          return rect.height;
        }
        return canvas.clientHeight > 0 ? canvas.clientHeight : 0.0;
      },
      showErrorDialog: function(title, message) {
        alert(title + ': ' + message);
      },
      setStatus: function(text) {
        var status = CascadeScopeShell.getStatusElement();
        if (!status) {
          return;
        }
        var safeText = text || '';
        status.innerText = safeText;
        status.style.display = safeText.length > 0 ? 'block' : 'none';
      }
    };

    // File upload infrastructure for CascadeScope Wasm build.
    var CascadeScopeFileUpload = {
      pending: false,
      acceptedExtensions: ['step', 'stp', 'iges', 'igs', 'stl', 'obj', 'ply', 'wrl', 'brep', 'xbf'],
      init: function() {
        var input = document.getElementById('cascadescope-file-input');
        var overlay = document.getElementById('cascadescope-open-overlay');
        input.addEventListener('change', function(e) {
          CascadeScopeFileUpload.loadFiles(e.target.files);
          input.value = '';
        });
        // When the overlay is visible, any click opens the file picker.
        overlay.addEventListener('click', function() {
          overlay.style.display = 'none';
          input.click();
        });
        CascadeScopeFileUpload.initDragDrop();
      },
      // Called from C++ to request a file open dialog.
      // Shows an overlay that the user must click (browser security requirement).
      requestOpen: function() {
        var overlay = document.getElementById('cascadescope-open-overlay');
        overlay.style.display = 'flex';
      },
      supportsFileName: function(name) {
        if (!name) {
          return false;
        }
        var dot = name.lastIndexOf('.');
        if (dot < 0 || dot + 1 >= name.length) {
          return false;
        }
        var ext = name.substring(dot + 1).toLowerCase();
        return CascadeScopeFileUpload.acceptedExtensions.indexOf(ext) >= 0;
      },
      detectDropZone: function(event) {
        var canvas = document.getElementById('canvas');
        if (!canvas) {
          return 0;
        }
        var rect = canvas.getBoundingClientRect();
        var midX = rect.left + rect.width * 0.5;
        return event.clientX >= midX ? 1 : 0;
      },
      hasSupportedFiles: function(fileList) {
        if (!fileList) {
          return false;
        }
        for (var i = 0; i < fileList.length; i++) {
          if (CascadeScopeFileUpload.supportsFileName(fileList[i].name)) {
            return true;
          }
        }
        return false;
      },
      notifyDragState: function(isActive, zone, hasSupportedFiles) {
        if (!Module['ccall']) {
          return;
        }
        Module['ccall']('CascadeScope_WasmDragStateChanged',
                        null,
                        ['number', 'number', 'number'],
                        [isActive ? 1 : 0, zone, hasSupportedFiles ? 1 : 0]);
      },
      // Load an array of File objects into the Emscripten VFS.
      loadFiles: function(files, options) {
        options = options || {};
        var callbackName = options.callbackName || 'CascadeScope_WasmFileUploaded';
        var dropZone = options.dropZone || 0;
        if (!Module['ccall'] || !Module['FS']) {
          console.warn('CascadeScope: runtime is not ready for file upload callbacks yet.');
          return;
        }
        for (var i = 0; i < files.length; i++) {
          (function(file) {
            var reader = new FileReader();
            reader.onload = function(ev) {
              var data = new Uint8Array(ev.target.result);
              var path = '/tmp/' + file.name;
              try { Module['FS'].unlink(path); } catch(ex) {}
              try { Module['FS'].writeFile(path, data); } catch(ex) {
                console.error('CascadeScope: failed to write file to VFS: ' + ex);
                return;
              }
              if (callbackName === 'CascadeScope_WasmFileDropped') {
                Module['ccall'](callbackName,
                                null,
                                ['string', 'number', 'number'],
                                [path, dropZone, CascadeScopeFileUpload.supportsFileName(file.name) ? 1 : 0]);
              } else {
                Module['ccall'](callbackName, null, ['string'], [path]);
              }
            };
            reader.readAsArrayBuffer(file);
          })(files[i]);
        }
      },
      // Install drag-and-drop on the canvas element.
      initDragDrop: function() {
        var canvas = document.getElementById('canvas');
        if (!canvas) {
          return;
        }
        var dragDepth = 0;
        var isInsideCanvas = function(e) {
          var rect = canvas.getBoundingClientRect();
          return e.clientX >= rect.left && e.clientX <= rect.right
              && e.clientY >= rect.top && e.clientY <= rect.bottom;
        };
        var updateDragState = function(e, isActive) {
          var files = (e.dataTransfer && e.dataTransfer.files) ? e.dataTransfer.files : [];
          if (isActive && !isInsideCanvas(e)) {
            CascadeScopeFileUpload.notifyDragState(false, 0, false);
            return;
          }
          CascadeScopeFileUpload.notifyDragState(isActive,
                                                 CascadeScopeFileUpload.detectDropZone(e),
                                                 CascadeScopeFileUpload.hasSupportedFiles(files));
        };
        window.addEventListener('dragover', function(e) {
          e.preventDefault();
        });
        window.addEventListener('drop', function(e) {
          e.preventDefault();
        });
        canvas.addEventListener('dragenter', function(e) {
          e.preventDefault();
          e.stopPropagation();
          dragDepth++;
          updateDragState(e, true);
        });
        canvas.addEventListener('dragover', function(e) {
          e.preventDefault();
          e.stopPropagation();
          updateDragState(e, true);
        });
        canvas.addEventListener('dragleave', function(e) {
          e.preventDefault();
          e.stopPropagation();
          dragDepth = Math.max(0, dragDepth - 1);
          if (dragDepth === 0) {
            CascadeScopeFileUpload.notifyDragState(false, 0, false);
          }
        });
        canvas.addEventListener('drop', function(e) {
          e.preventDefault();
          e.stopPropagation();
          dragDepth = 0;
          var zone = CascadeScopeFileUpload.detectDropZone(e);
          CascadeScopeFileUpload.notifyDragState(false, zone, false);
          if (e.dataTransfer && e.dataTransfer.files.length > 0) {
            CascadeScopeFileUpload.loadFiles(e.dataTransfer.files, {
              callbackName: 'CascadeScope_WasmFileDropped',
              dropZone: zone
            });
          }
        });
      }
    };

    // File download infrastructure for CascadeScope Wasm build. Reads a file
    // from the Emscripten VFS and hands it to the browser as a download.
    var CascadeScopeFileDownload = {
      trigger: function(vfsPath, downloadName) {
        if (!Module['FS']) {
          console.warn('CascadeScope: runtime is not ready for file download.');
          return;
        }
        var data;
        try {
          data = Module['FS'].readFile(vfsPath);
        } catch (ex) {
          console.error('CascadeScope: failed to read VFS file for download: ' + ex);
          return;
        }
        var blob = new Blob([data], { type: 'application/octet-stream' });
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.href = url;
        link.download = downloadName || 'download.brep';
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(function() {
          URL.revokeObjectURL(url);
          try { Module['FS'].unlink(vfsPath); } catch (ex) {}
        }, 1000);
      }
    };

    var CascadeScopeBuildStamp = '1776287968';
    function cascadeScopeVersionedPath(path) {
      if (!path || path.indexOf('blob:') === 0 || path.indexOf('data:') === 0) {
        return path;
      }
      var separator = path.indexOf('?') >= 0 ? '&' : '?';
      return path + separator + 'v=' + CascadeScopeBuildStamp;
    }

    var Module = {
      preRun: [function () {
        var idbfs = (typeof IDBFS !== 'undefined')
          ? IDBFS
          : (FS && FS.filesystems ? FS.filesystems.IDBFS : null);
        if (!idbfs) {
          console.warn('IDBFS unavailable; settings will not persist.');
          return;
        }
        try { FS.mkdir('/cs_config'); }
        catch (e) {
          if (!e || e.code !== 'EEXIST') { console.warn('mkdir /cs_config:', e); }
        }
        try { FS.mount(idbfs, {}, '/cs_config'); }
        catch (e) { console.warn('IDBFS mount failed:', e); return; }
        Module.addRunDependency('cs-config-syncfs');
        FS.syncfs(true, function (err) {
          if (err) { console.warn('IDBFS hydrate failed:', err); }
          Module.removeRunDependency('cs-config-syncfs');
        });
      }],
      print: function(text) { console.log(text); },
      printErr: function(text) { console.error(text); },
      canvas: CascadeScopeShell.getCanvas(),
      locateFile: function(path, prefix) {
        return cascadeScopeVersionedPath((prefix || '') + path);
      },
      setStatus: function(text) {
        CascadeScopeShell.setStatus(text);
      },
      monitorRunDependencies: function(left) {
        if (left === 0) Module.setStatus('');
      }
    };
    CascadeScopeFileUpload.init();
    window.onerror = function(message, source, lineno, colno, error) {
      var errorName = '';
      if (error && typeof error.name === 'string' && error.name.length > 0) {
        errorName = error.name;
      } else if (error && error.constructor && typeof error.constructor.name === 'string') {
        errorName = error.constructor.name;
      }

      var errorText = typeof message === 'string'
        ? message
        : (error && typeof error.toString === 'function' ? String(error) : '');

      if (errorName === 'EmscriptenSjLj' || errorText.indexOf('EmscriptenSjLj') >= 0) {
        return true;
      }

      if (error && typeof error.message === 'string' && error.message.length > 0) {
        console.error('error:', error.message, source, lineno, colno, error);
      } else {
        console.error('error:', message, source, lineno, colno, error);
      }
      return false;
    };
  </script>
  <script src="coi-serviceworker.js?v=1776287968"></script>
  <script>
    // Safari workaround: on Cmd+R refresh, Safari may serve the HTML from its
    // HTTP cache without routing through the service worker, so COOP/COEP headers
    // are missing and SharedArrayBuffer is unavailable.  Fix: unregister the stale
    // SW, redirect with a cache-buster, and let coi-serviceworker.js re-register
    // from scratch (its install → skipWaiting → claim → reload flow always works).
    // The updated SW adds Cache-Control: no-store on document responses, so once
    // this cycle completes the problem does not recur.
    (function() {
      if (window.crossOriginIsolated) {
        var url = new URL(location.href);
        if (url.searchParams.has('_coi')) {
          url.searchParams.delete('_coi');
          history.replaceState(null, '', url);
        }
        return;
      }
      if (!navigator.serviceWorker) return;
      var url = new URL(location.href);
      if (url.searchParams.has('_coi')) {
        // Already redirected — coi-serviceworker.js will re-register and reload.
        url.searchParams.delete('_coi');
        history.replaceState(null, '', url);
        return;
      }
      // SW is controlling but page is not isolated: unregister and re-register.
      if (navigator.serviceWorker.controller) {
        document.getElementById('status').innerText = 'Enabling secure context...';
        navigator.serviceWorker.getRegistration().then(function(reg) {
          if (reg) {
            reg.unregister().then(function() {
              var freshUrl = new URL(location.href);
              freshUrl.searchParams.set('_coi', '1');
              location.replace(freshUrl);
            });
          }
        });
      }
    })();
  </script>
  <!-- <script async type="text/javascript" src="CascadeScope.js"></script> -->
  <script>
    // Only start loading the wasm module if the page is already in a
    // cross-origin-isolated context. If not, coi-serviceworker.js above will
    // install the SW and trigger a reload (or the Safari recovery above will
    // redirect with _coi=1) — in that case, loading CascadeScope.js now would
    // race with the reload and fail with "SharedArrayBuffer transfer requires
    // self.crossOriginIsolated" at loadWasmModuleToWorker. Gating the insert
    // eliminates that race on every browser without adding workarounds.
    if (window.crossOriginIsolated) {
      var cascadeScopeModuleScript = document.createElement('script');
      cascadeScopeModuleScript.async = true;
      cascadeScopeModuleScript.type = 'text/javascript';
      cascadeScopeModuleScript.src =
        'CascadeScope.js?v=1776287968';
      document.body.appendChild(cascadeScopeModuleScript);
    }
  </script>
</body>
</html>
